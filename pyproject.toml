[tool.black]
line-length = 120
target-version = ['py38', 'py39', 'py310', 'py311']
exclude = '''
/(
    \.venv
  | \.git
  | __pycache__
  | \.pytest_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = [".venv", ".git", "__pycache__", ".pytest_cache"]

[tool.pylint.messages_control]
max-line-length = 120
disable = [
    "C0111",  # missing-docstring (already well-documented)
    "R0903",  # too-few-public-methods (interfaces are intentionally minimal)
    "R0913",  # too-many-arguments (config-heavy functions are acceptable)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --strict-markers"
