[project]
name = "jules-idea-automation"
version = "1.0.0"
description = "CLI tool for automating idea generation, repo creation, and Jules session initialization."
requires-python = ">=3.9"

[tool.black]
line-length = 120

[tool.isort]
profile = "black"
line_length = 120

[tool.pytest.ini_options]
testpaths = ["tests"]
